name: Build

on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.create_release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: SUAS-STEM/gcs
          token: ${{ secrets.GH_PAT }}
          submodules: false
          lfs: true

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Upgrade aqt
        run: pip install --upgrade aqtinstall

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.1'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtserialport qtmultimedia qtlocation qtpositioning qtshadertools qtquicktimeline
          mirror: 'https://download.qt.io'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install aircraft dependencies
        working-directory: aircraft
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: .\install.ps1

      - name: Arrange MAVSDK layout for CMake
        working-directory: aircraft
        run: |
          $mavsdk = "extern\mavsdk"
          $dll = Get-ChildItem $mavsdk -Recurse -Filter "mavsdk.dll" | Select-Object -First 1
          $lib = Get-ChildItem $mavsdk -Recurse -Filter "mavsdk.lib" | Select-Object -First 1
          if (-not $dll) { Write-Error "mavsdk.dll not found under $mavsdk"; exit 1 }
          if (-not $lib) { Write-Error "mavsdk.lib not found under $mavsdk"; exit 1 }
          New-Item -ItemType Directory -Force "$mavsdk\Release\bin" | Out-Null
          New-Item -ItemType Directory -Force "$mavsdk\Release\lib" | Out-Null
          $dstDll = Join-Path (Resolve-Path "$mavsdk\Release\bin") "mavsdk.dll"
          $dstLib = Join-Path (Resolve-Path "$mavsdk\Release\lib") "mavsdk.lib"
          if ($dll.FullName -ne $dstDll) { Copy-Item $dll.FullName $dstDll -Force }
          if ($lib.FullName -ne $dstLib) { Copy-Item $lib.FullName $dstLib -Force }

      - name: Configure
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Stage binaries for packaging
        run: |
          New-Item -ItemType Directory -Force compile

          Copy-Item build\GcsApp.exe compile\ssgcs.exe

          # MAVSDK runtime
          Copy-Item aircraft\extern\mavsdk\Release\bin\mavsdk.dll compile\

          # OpenCV runtime (release only)
          $opencvBin = "aircraft\extern\opencv\build\x64\vc16\bin"
          Copy-Item "$opencvBin\opencv_world*.dll"            compile\
          Copy-Item "$opencvBin\opencv_videoio_ffmpeg*_64.dll" compile\ -ErrorAction SilentlyContinue

      - name: Download VC++ Redistributable
        run: |
          Invoke-WebRequest `
            -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" `
            -OutFile "compile\vc_redist.x64.exe"

      - name: Run windeployqt
        run: |
          windeployqt `
            --release `
            --compiler-runtime `
            --qmldir GcsContent `
            --qmldir Gcs `
            --qmlimport build `
            compile\ssgcs.exe

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ssgcs.iss'

      - name: Rename artifact
        run: Copy-Item dist\ssgcs.exe dist\ssgcs-win32-amd64.exe

      - name: Create versioned release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $tags = gh release list --repo SUAS-STEM/.gcs --limit 200 --json tagName |
            ConvertFrom-Json |
            Where-Object { $_.tagName -match '^dev-v0\.(\d+)$' } |
            ForEach-Object { [int]($_.tagName -replace '^dev-v0\.', '') }
          $next = if ($tags) { ($tags | Measure-Object -Maximum).Maximum + 1 } else { 1 }
          $tag = "dev-v0.$($next.ToString('D3'))"
          gh release create $tag dist\ssgcs-win32-amd64.exe `
            --repo SUAS-STEM/.gcs `
            --title $tag `
            --latest
          "tag=$tag" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

  macos:
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: SUAS-STEM/gcs
          token: ${{ secrets.GH_PAT }}
          submodules: false
          lfs: true

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.1'
          host: mac
          target: desktop
          arch: clang_64
          modules: qtserialport qtmultimedia qtlocation qtpositioning qtshadertools qtquicktimeline
          cache: true

      - name: Install aircraft dependencies
        run: bash aircraft/install-mac.sh

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Deploy Qt + create DMG
        run: |
          mkdir -p dist
          macdeployqt build/GcsApp.app \
            -qmldir=GcsContent \
            -qmldir=Gcs \
            -qmlimport=build \
            -dmg
          mv build/GcsApp.dmg dist/ssgcs-macos-arm64.dmg

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release upload ${{ needs.build.outputs.tag }} dist/ssgcs-macos-arm64.dmg \
            --repo SUAS-STEM/.gcs
